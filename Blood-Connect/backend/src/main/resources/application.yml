spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blooddonor}
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your@gmail.com}
    password: ${MAIL_PASSWORD:yourpassword}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:BloodConnectSuperSecretKeyForJWTSigningMustBe256BitsLong!!}
    expiration: 86400000
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS:src/main/resources/firebase-service-account.json}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
  auth-token: ${TWILIO_AUTH_TOKEN:your_auth_token}
  from-number: ${TWILIO_FROM_NUMBER:+1234567890}

logging:
  level:
    com.blooddonor: DEBUG
    org.springframework.security: WARN
